name: Enforce Conventional Commits

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          failOnWarnings: false